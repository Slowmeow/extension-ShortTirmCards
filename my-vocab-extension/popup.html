<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      font-family: sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 14px;
    }

    h3 {
      font-size: 14px;
      color: #cba6f7;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section {
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 11px;
      color: #6c7086;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .lang-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .lang-btn {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 8px;
      padding: 8px 10px;
      color: #cdd6f4;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-btn:hover {
      border-color: #cba6f7;
    }

    .lang-btn.active {
      border-color: #cba6f7;
      background: #2a2a3d;
      color: #cba6f7;
      font-weight: bold;
    }

    .divider {
      border-top: 1px solid #313244;
      margin: 14px 0;
    }

    .hint {
      font-size: 11px;
      color: #6c7086;
      line-height: 1.6;
      text-align: center;
    }

    .status {
      font-size: 12px;
      color: #a6e3a1;
      text-align: center;
      margin-top: 10px;
      height: 16px;
    }
  </style>
</head>
<body>

  <h3>📚 VocabDeck</h3>

  <div class="section">
    <div class="section-title">Язык оригинала</div>
    <div class="lang-grid" id="source-grid">
      <button class="lang-btn" data-lang="ja">🇯🇵 Японский</button>
      <button class="lang-btn" data-lang="en">🇬🇧 Английский</button>
      <button class="lang-btn" data-lang="ko">🇰🇷 Корейский</button>
      <button class="lang-btn" data-lang="zh">🇨🇳 Китайский</button>
      <button class="lang-btn" data-lang="de">🇩🇪 Немецкий</button>
      <button class="lang-btn" data-lang="fr">🇫🇷 Французский</button>
      <button class="lang-btn" data-lang="es">🇪🇸 Испанский</button>
      <button class="lang-btn" data-lang="it">🇮🇹 Итальянский</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">Переводить на</div>
    <div class="lang-grid" id="target-grid">
      <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
      <button class="lang-btn" data-lang="en">🇬🇧 Английский</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="hint">
    Выдели текст на странице → 🔍
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
